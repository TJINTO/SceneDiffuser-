model_config: configs/scenediffuserpp/model_paper.yaml
training:
  device: cuda
  precision: bf16
  seed: 20260720
  batch_size: 3
  max_steps: 10000
  checkpoint_every: 500
  learning_rate: 0.0003
  beta1: 0.9
  weight_decay: 0.01
  gradient_clip_norm: 1.0
  ema_decay: 0.999
  task: behavior_prediction
  history_steps: 11
  channel_metrics_every: 100
optimizer_provenance:
  implementation: topoworld.scenediffuserpp.trainer.PaperAdafactor
  scale_parameter: false
  relative_step: false
  warmup_init: false
  decay_adam: 0.9999
  paper_decay_adam_0_9999_available: true
